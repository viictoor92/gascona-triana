<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Gascona Triana · Carta</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,700;0,800;1,500&family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500&family=Caveat:wght@600&display=swap" rel="stylesheet">
<style>
  :root{
    --petroleo:#233640;      /* azul petróleo de la marca */
    --petroleo-osc:#1b2a32;
    --petroleo-2:#2e414a;     /* panel */
    --crema:#f1e2cb;          /* crema (texto/logo sobre petróleo) */
    --crema-bg:#f7e6cf;       /* fondo páginas interiores */
    --crema-2:#efddc2;
    --dorado:#e3b87d;         /* dorado del marco */
    --dorado-cl:#f0c896;
    --dorado-osc:#c69a5f;
    --tinta:#243640;          /* texto sobre crema */
    --gris:#8a7e6c;
    --linea:#e3d2b4;
    --rojo:#9e3b2e;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;}
  body{
    font-family:'Cormorant Garamond',Georgia,serif;
    background:var(--petroleo-osc);
    color:var(--tinta);
    font-size:18px;line-height:1.45;
    -webkit-font-smoothing:antialiased;
  }

  /* ---------- PANTALLA DE IDIOMAS ---------- */
  #splash{
    position:fixed;inset:0;z-index:100;
    background:
      radial-gradient(120% 70% at 50% 12%, rgba(227,184,125,.12), transparent 60%),
      linear-gradient(180deg,var(--petroleo) 0%, var(--petroleo-osc) 100%);
    color:var(--crema);
    display:flex;
    padding:12px;
    overflow-y:auto;-webkit-overflow-scrolling:touch;
    transition:opacity .5s ease, visibility .5s ease;
  }
  #splash.hide{opacity:0;visibility:hidden;}
  /* marco dorado doble redondeado, como la portada del PDF.
     margin:auto -> centra si cabe y permite scroll sin recortar las esquinas */
  .marco{
    width:100%;max-width:360px;margin:auto;
    border:1.5px solid var(--dorado);border-radius:22px;
    box-shadow:0 0 0 5px var(--petroleo), 0 0 0 6.5px var(--dorado-osc), 0 18px 50px rgba(0,0,0,.45);
    background:var(--petroleo-2);
    padding:22px 24px 20px;text-align:center;
    display:flex;flex-direction:column;align-items:center;
  }
  .barril{width:92px;height:auto;display:block;filter:drop-shadow(0 6px 10px rgba(0,0,0,.3));}
  .logo-g1{font-family:'Playfair Display',serif;font-weight:800;font-size:30px;letter-spacing:5px;color:var(--crema);line-height:.9;margin-top:6px;}
  .logo-g2{font-family:'Playfair Display',serif;font-size:12px;letter-spacing:9px;color:var(--crema);margin-top:4px;}
  .divisor{width:200px;max-width:78%;height:auto;display:block;margin:5px 0 2px;opacity:.95;}
  .splash-sub{font-family:'Caveat',cursive;font-size:20px;color:var(--dorado-cl);margin-top:2px;}
  .splash-tag{font-size:13.5px;color:#d8cdb8;margin:5px 0 12px;letter-spacing:.3px;max-width:280px;font-style:italic;}
  .pick{font-family:'Playfair Display',serif;font-size:11.5px;letter-spacing:2.5px;text-transform:uppercase;color:var(--dorado);margin-bottom:9px;text-wrap:balance;max-width:260px;}
  .langs{display:flex;flex-direction:column;gap:7px;width:100%;max-width:280px;}
  .lang{
    display:flex;align-items:center;gap:14px;
    background:rgba(241,226,203,.06);
    border:1px solid rgba(227,184,125,.5);
    color:var(--crema);
    padding:9px 20px;border-radius:40px;cursor:pointer;
    font-family:'Playfair Display',serif;font-size:16px;
    transition:background .2s,border-color .2s,transform .1s;
  }
  .lang:active{transform:scale(.97);}
  .lang:hover{background:rgba(227,184,125,.16);border-color:var(--dorado);}
  .lang .flag{font-size:21px;line-height:1;}
  .lang .nm{flex:1;text-align:left;}
  .lang .ar{color:var(--dorado);font-size:19px;}
  .splash-foot{margin-top:12px;font-size:12px;color:#b6a98f;letter-spacing:.5px;}

  /* ---------- CARTA ---------- */
  #app{display:none;}
  .wrap{max-width:680px;margin:0 auto;background:var(--crema-bg);min-height:100vh;box-shadow:0 0 50px rgba(0,0,0,.4);}

  header.top{
    background:
      radial-gradient(130% 95% at 50% 0%, rgba(227,184,125,.14), transparent 55%),
      var(--petroleo);
    color:var(--crema);text-align:center;padding:24px 20px 20px;position:relative;
    border-bottom:3px solid var(--dorado);
  }
  header.top .barril{width:84px;margin:0 auto;}
  header.top .logo-g1{font-size:26px;letter-spacing:4px;margin-top:6px;}
  header.top .logo-g2{font-size:10px;letter-spacing:7px;}
  header.top .divisor{width:170px;margin:6px auto 4px;}
  header.top .divisor{margin-bottom:2px;}

  /* botón globo: volver al selector de idioma (esquina sup. dcha.) */
  .globe{
    position:absolute;top:14px;right:14px;z-index:5;
    width:42px;height:42px;border-radius:50%;
    background:rgba(241,226,203,.08);
    border:1px solid rgba(227,184,125,.5);
    color:#e9dcc4;
    display:flex;align-items:center;justify-content:center;
    cursor:pointer;
    transition:background .2s,border-color .2s,transform .1s,color .2s;
    -webkit-backdrop-filter:blur(2px);backdrop-filter:blur(2px);
  }
  .globe:hover{background:rgba(227,184,125,.18);border-color:var(--dorado);color:var(--dorado-cl);}
  .globe:active{transform:scale(.92);}
  .globe svg{width:23px;height:23px;display:block;}

  nav{position:sticky;top:0;z-index:10;background:var(--petroleo-osc);display:flex;overflow-x:auto;gap:4px;padding:9px 12px;box-shadow:0 3px 12px rgba(0,0,0,.25);scrollbar-width:none;}
  nav::-webkit-scrollbar{display:none;}
  nav a{color:var(--crema);text-decoration:none;font-family:'Playfair Display',serif;font-size:12.5px;white-space:nowrap;padding:6px 13px;border-radius:20px;border:1px solid rgba(227,184,125,.3);}
  nav a:active{background:var(--dorado);color:var(--petroleo);}
  nav a.active{background:var(--dorado);color:var(--petroleo);border-color:var(--dorado);font-weight:700;}

  section{padding:8px 22px 4px;}
  .cat{text-align:center;margin:22px 0 14px;}
  .cat h2{font-family:'Playfair Display',serif;font-weight:700;font-size:25px;color:var(--petroleo);letter-spacing:.4px;}
  .cat .orna{color:var(--dorado-osc);font-size:13px;letter-spacing:5px;margin-top:3px;}
  .cat .note{font-size:13.5px;color:var(--gris);font-style:italic;margin-top:3px;}

  .hero-img{width:100%;height:158px;object-fit:cover;border-radius:12px;margin:4px 0 6px;display:block;box-shadow:0 6px 16px rgba(35,54,64,.22);border:1px solid var(--dorado-osc);}

  .plato{display:flex;justify-content:space-between;align-items:baseline;gap:12px;padding:10px 0;border-bottom:1px solid var(--linea);}
  .plato:last-child{border-bottom:none;}
  .plato .n{font-family:'Playfair Display',serif;font-size:17px;color:var(--tinta);}
  .plato .d{font-size:14.5px;color:var(--gris);display:block;margin-top:1px;font-style:italic;}
  .plato .precio{font-family:'Playfair Display',serif;font-size:16px;color:var(--dorado-osc);font-weight:700;white-space:nowrap;text-align:right;}
  .badge{display:inline-block;background:var(--petroleo);color:var(--crema);font-family:Arial,sans-serif;font-size:9px;font-weight:bold;padding:2px 7px;border-radius:3px;margin-left:6px;letter-spacing:.6px;vertical-align:middle;}
  .badge.dop{background:var(--dorado-osc);color:#fff;}
  .colhdr{display:flex;align-items:center;justify-content:flex-end;gap:16px;font-family:'Playfair Display',serif;font-size:12px;letter-spacing:1px;color:var(--dorado-osc);text-transform:uppercase;padding-bottom:2px;border-bottom:2px solid var(--linea);margin-bottom:2px;}
  .colhdr span:first-child{font-size:18px;letter-spacing:0;font-weight:700;}

  /* ---------- Platos con foto + modal ---------- */
  .plato.has-foto{cursor:pointer;}
  .plato.has-foto .cam{display:inline-block;margin-left:7px;color:var(--dorado-osc);opacity:.85;vertical-align:-2px;}
  .plato.has-foto:active{background:rgba(227,184,125,.12);border-radius:8px;}
  .modal{position:fixed;inset:0;z-index:200;display:flex;align-items:center;justify-content:center;
    padding:18px;background:rgba(27,42,50,.74);backdrop-filter:blur(3px);
    opacity:0;visibility:hidden;transition:opacity .22s ease,visibility .22s ease;}
  .modal.open{opacity:1;visibility:visible;}
  .modal-card{position:relative;width:100%;max-width:380px;background:var(--crema-bg);
    border:1.5px solid var(--dorado);border-radius:18px;
    box-shadow:0 0 0 4px var(--petroleo),0 0 0 5.5px var(--dorado-osc),0 18px 50px rgba(0,0,0,.5);
    overflow:hidden;transform:translateY(14px) scale(.98);transition:transform .26s cubic-bezier(.2,.8,.2,1);}
  .modal.open .modal-card{transform:none;}
  .modal-imgwrap{width:100%;aspect-ratio:1/1;background:var(--crema-2);overflow:hidden;}
  .modal-imgwrap img{width:100%;height:100%;object-fit:cover;display:block;
    transition:opacity .5s ease, filter .6s ease, transform .6s ease;}
  .modal-imgwrap img.loading{opacity:0;filter:blur(16px);transform:scale(1.06);}
  .modal-imgwrap img.ready{opacity:1;filter:blur(0);transform:scale(1);}
  .modal-body{padding:16px 20px 20px;text-align:center;}
  .modal-name{font-family:'Playfair Display',serif;font-weight:700;font-size:22px;color:var(--petroleo);line-height:1.1;}
  .modal-desc{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:16px;color:var(--gris);margin-top:5px;}
  .modal-price{font-family:'Playfair Display',serif;font-weight:700;font-size:18px;color:var(--dorado-osc);margin-top:11px;}
  .modal-x{position:absolute;top:10px;right:10px;z-index:2;width:34px;height:34px;border-radius:50%;
    border:1px solid var(--dorado);background:rgba(27,42,50,.55);color:var(--crema);
    font-size:21px;line-height:1;cursor:pointer;display:flex;align-items:center;justify-content:center;}

  .vinos h3{font-family:'Playfair Display',serif;font-size:16px;color:var(--petroleo);margin:16px 0 4px;letter-spacing:.3px;border-bottom:1px solid var(--dorado-osc);padding-bottom:3px;}
  .vino{display:flex;justify-content:space-between;gap:10px;padding:5px 0;font-size:15.5px;}
  .vino .vn{color:var(--tinta);} .vino .vn small{color:var(--gris);font-style:italic;font-size:13px;}
  .vino .vp{font-family:'Playfair Display',serif;color:var(--dorado-osc);white-space:nowrap;font-size:14.5px;}

  .iva{text-align:center;font-size:12px;color:var(--dorado-osc);letter-spacing:2px;margin:12px 0;text-transform:uppercase;}

  footer{background:var(--petroleo);color:var(--crema);text-align:center;padding:24px 22px 32px;margin-top:18px;border-top:3px solid var(--dorado);}
  footer .marca{font-family:'Playfair Display',serif;font-weight:700;font-size:19px;color:var(--dorado-cl);letter-spacing:2px;}
  footer .fdir{font-size:14px;color:#e4d9c4;margin-top:6px;line-height:1.5;}
  footer a{color:var(--dorado-cl);text-decoration:none;}
  footer .aler{font-size:12.5px;color:#b6ab95;margin-top:14px;font-style:italic;}
</style>
</head>
<body>

<!-- ====== SPLASH IDIOMAS ====== -->
<div id="splash">
  <div class="marco">
    <img class="barril" src="img/barril.webp" alt="Barril Gascona Triana">
    <div class="logo-g1">GASCONA</div>
    <div class="logo-g2">TRIANA</div>
    <img class="divisor" src="img/divisor.webp" alt="">
    <div class="splash-sub">Sidrería asturiana</div>
    <div class="splash-tag">Nuestro particular bulevar de la sidra en Sevilla</div>
    <div class="pick">Idioma · Language · Lingua · Langue</div>
    <div class="langs">
    <button class="lang" onclick="setLang('es')"><span class="nm">Español</span><span class="ar">→</span></button>
    <button class="lang" onclick="setLang('en')"><span class="nm">English</span><span class="ar">→</span></button>
    <button class="lang" onclick="setLang('it')"><span class="nm">Italiano</span><span class="ar">→</span></button>
    <button class="lang" onclick="setLang('fr')"><span class="nm">Français</span><span class="ar">→</span></button>
  </div>
    <div class="splash-foot">Calle Castilla, 22 · Triana, Sevilla</div>
  </div>
</div>

<!-- ====== CARTA ====== -->
<div id="app"><div class="wrap">
  <header class="top">
    <button class="globe" id="globeBtn" onclick="backToLang()" aria-label="Cambiar idioma">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <circle cx="12" cy="12" r="9"/>
        <path d="M3 12h18"/>
        <path d="M12 3c2.6 2.7 2.6 15.3 0 18M12 3c-2.6 2.7-2.6 15.3 0 18"/>
        <path d="M4.8 6.2c2 1.4 12.4 1.4 14.4 0M4.8 17.8c2-1.4 12.4-1.4 14.4 0"/>
      </svg>
    </button>
    <img class="barril" src="img/barril.webp" alt="Barril Gascona Triana">
    <div class="logo-g1">GASCONA</div>
    <div class="logo-g2">TRIANA</div>
    <img class="divisor" src="img/divisor.webp" alt="">
  </header>
  <nav id="nav"></nav>
  <main id="menu"></main>
  <footer>
    <div class="marca">GASCONA TRIANA</div>
    <div class="fdir">
      Calle Castilla, 22 · Triana, Sevilla 41010<br>
      <a href="tel:+34636474563">636 474 563</a> · <a href="https://instagram.com/gasconatriana" target="_blank">@gasconatriana</a>
    </div>
    <div class="aler" id="aler"></div>
  </footer>
</div></div>

<!-- ====== MODAL DE PLATO ====== -->
<div class="modal" id="modal" aria-hidden="true">
  <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="mName">
    <button class="modal-x" id="modalX" aria-label="Cerrar">&times;</button>
    <div class="modal-imgwrap"><img id="mImg" alt=""></div>
    <div class="modal-body">
      <div class="modal-name" id="mName"></div>
      <div class="modal-desc" id="mDesc"></div>
      <div class="modal-price" id="mPrice"></div>
    </div>
  </div>
</div>

<script>
/* ====== CARGA DE DATOS (menu.json) ====== */
let DATA = null, LANG = 'es';
const dataReady = fetch('menu.json', {cache:'no-cache'})
  .then(r => { if(!r.ok) throw new Error('HTTP '+r.status); return r.json(); })
  .then(j => { DATA = j; })
  .catch(err => { console.error('No se pudo cargar menu.json:', err); });

/* ====== RENDER ====== */
function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;'); }
function renderFood(key){
  const sec = DATA.menu[key];
  let h = `<section id="${key}">`;
  h += `<div class="cat"><h2>${DATA.sections[key][LANG]}</h2><div class="orna">✦ ✦ ✦</div>`;
  if(sec.note) h += `<div class="note">${sec.note[LANG]}</div>`;
  h += `</div>`;
  if(sec.img) h += `<img class="hero-img" src="${sec.img}" alt="${DATA.sections[key][LANG]}" loading="lazy" onerror="this.remove()">`;
  if(sec.cols) h += `<div class="colhdr"><span>${DATA.columns[LANG][0]}</span><span>${DATA.columns[LANG][1]}</span></div>`;
  for(const it of sec.items){
    const name = (it.n && (it.n[LANG] || it.n.es)) || '';
    const desc = it.d ? (it.d[LANG] || '') : '';
    const badge = it.dop? `<span class="badge dop">DOP</span>`:``;
    const cls = it.img ? 'plato has-foto' : 'plato';
    const attrs = it.img
      ? ` data-img="images/${it.img}" data-n="${esc(name)}" data-d="${esc(desc)}" data-p="${esc(it.p)}"`
      : ``;
    const cam = it.img
      ? `<span class="cam" aria-hidden="true"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"><path d="M4 8.5A1.5 1.5 0 0 1 5.5 7h1.7l1-1.5a1 1 0 0 1 .83-.45h4.94a1 1 0 0 1 .83.45l1 1.5h1.7A1.5 1.5 0 0 1 20 8.5v9A1.5 1.5 0 0 1 18.5 19h-13A1.5 1.5 0 0 1 4 17.5Z"/><circle cx="12" cy="12.6" r="3"/></svg></span>`
      : ``;
    h += `<div class="${cls}"${attrs}><div><span class="n">${name}${badge}${cam}</span>`+
         (desc? `<span class="d">${desc}</span>`:``)+
         `</div><span class="precio">${it.p}</span></div>`;
  }
  h += `</section>`;
  return h;
}
function renderWines(key, data){
  let h = `<section id="${key}"><div class="cat"><h2>${DATA.sections[key][LANG]}</h2><div class="orna">✦ ✦ ✦</div></div><div class="vinos">`;
  for(const grp of data){
    h += `<h3>${grp.h[LANG]}</h3>`;
    for(const row of grp.l){
      h += `<div class="vino"><span class="vn">${row[0]}</span><span class="vp">${row[1]}</span></div>`;
    }
  }
  h += `</div></section>`;
  return h;
}
function build(){
  document.documentElement.lang = LANG;
  document.getElementById('aler').textContent = DATA.ui[LANG].aler;
  // nav
  let nav = '';
  DATA.order.forEach(k=> nav += `<a href="#${k}">${DATA.sections[k][LANG]}</a>`);
  nav += `<a href="#vinos">${DATA.sections.vinos[LANG]}</a><a href="#bebidas">${DATA.sections.bebidas[LANG]}</a>`;
  document.getElementById('nav').innerHTML = nav;
  // menu
  let m = '';
  DATA.order.forEach(k=> m += renderFood(k));
  m += renderWines('vinos', DATA.wines);
  m += renderWines('bebidas', DATA.drinks);
  m += `<div class="iva">★ IVA incluido ★</div>`;
  document.getElementById('menu').innerHTML = m;
  spyActiveId = null;
  updateActiveSection();
}

/* ====== Marcado de la sección activa al hacer scroll ====== */
let spyTicking = false, spyActiveId = null;
function updateActiveSection(){
  spyTicking = false;
  const nav = document.getElementById('nav');
  const sections = [...document.querySelectorAll('#menu section')];
  if(!nav || !sections.length) return;
  const line = nav.offsetHeight + 16;
  let current = sections[0].id;
  for(const s of sections){
    if(s.getBoundingClientRect().top - line <= 0) current = s.id;
    else break;
  }
  if(window.innerHeight + window.scrollY >= document.documentElement.scrollHeight - 2)
    current = sections[sections.length - 1].id;
  if(current === spyActiveId) return;
  spyActiveId = current;
  let activeLink = null;
  nav.querySelectorAll('a').forEach(a=>{
    const on = a.getAttribute('href') === '#' + current;
    a.classList.toggle('active', on);
    if(on) activeLink = a;
  });
  if(activeLink) activeLink.scrollIntoView({inline:'center', block:'nearest', behavior:'smooth'});
}
window.addEventListener('scroll', ()=>{
  if(!spyTicking){ spyTicking = true; requestAnimationFrame(updateActiveSection); }
}, {passive:true});
window.addEventListener('resize', updateActiveSection, {passive:true});

/* ====== Modal de plato con foto (imagen 1:1) ====== */
const modal = document.getElementById('modal');
function openDish(el){
  const img = document.getElementById('mImg');
  // Reinicia a estado "cargando" (oculta la foto anterior) y entra con blur progresivo.
  img.classList.remove('ready'); img.classList.add('loading');
  img.onload = ()=>{ img.classList.add('ready'); img.classList.remove('loading'); };
  img.alt = el.dataset.n || '';
  img.src = el.dataset.img;
  if(img.complete && img.naturalWidth){
    requestAnimationFrame(()=>{ img.classList.add('ready'); img.classList.remove('loading'); });
  }
  document.getElementById('mName').textContent = el.dataset.n || '';
  const d = document.getElementById('mDesc');
  d.textContent = el.dataset.d || ''; d.style.display = el.dataset.d ? 'block' : 'none';
  document.getElementById('mPrice').textContent = el.dataset.p || '';
  modal.classList.add('open'); modal.setAttribute('aria-hidden','false');
  document.body.style.overflow = 'hidden';
}
function closeDish(){
  modal.classList.remove('open'); modal.setAttribute('aria-hidden','true');
  document.body.style.overflow = '';
}
document.getElementById('menu').addEventListener('click', e=>{
  const p = e.target.closest('.plato.has-foto'); if(p) openDish(p);
});
document.getElementById('modalX').addEventListener('click', closeDish);
modal.addEventListener('click', e=>{ if(e.target===modal) closeDish(); });
document.addEventListener('keydown', e=>{ if(e.key==='Escape' && modal.classList.contains('open')) closeDish(); });

/* Deslizar hacia abajo para cerrar el modal */
const mCard = modal.querySelector('.modal-card');
let dSy = 0, dDrag = false, dDy = 0, dSt = 0;
mCard.addEventListener('touchstart', e=>{
  if(e.touches.length!==1) return;
  dSy = e.touches[0].clientY; dSt = e.timeStamp; dDrag = false; dDy = 0;
}, {passive:true});
mCard.addEventListener('touchmove', e=>{
  if(e.touches.length!==1) return;
  const delta = e.touches[0].clientY - dSy;
  if(!dDrag){ if(delta>5){ dDrag = true; mCard.style.transition='none'; } else return; }
  dDy = Math.max(0, delta);
  e.preventDefault();
  mCard.style.transform = 'translateY('+dDy+'px)';
  modal.style.opacity = Math.max(0.25, 1 - dDy/(mCard.offsetHeight*0.9));
}, {passive:false});
function endDragDish(){
  if(!dDrag) return; dDrag = false;
  const vel = dDy / Math.max(1, (performance.now()-dSt));
  const threshold = Math.min(130, mCard.offsetHeight*0.28);
  mCard.style.transition = 'transform .22s ease';
  if(dDy>threshold || vel>0.5){
    mCard.style.transform = 'translateY(100%)'; modal.style.opacity = '0';
    setTimeout(()=>{ closeDish(); mCard.style.transition=''; mCard.style.transform=''; modal.style.opacity=''; }, 200);
  } else {
    mCard.style.transform = 'translateY(0)'; modal.style.opacity = '';
    setTimeout(()=>{ mCard.style.transition=''; mCard.style.transform=''; }, 230);
  }
  dDy = 0;
}
mCard.addEventListener('touchend', endDragDish);
mCard.addEventListener('touchcancel', endDragDish);
async function setLang(l){
  if(!DATA){ await dataReady; }
  if(!DATA){ alert('No se pudo cargar la carta. Comprueba tu conexión y recarga.'); return; }
  LANG = l;
  build();
  document.getElementById('splash').classList.add('hide');
  document.getElementById('app').style.display = 'block';
  window.scrollTo(0,0);
}
function backToLang(){
  document.getElementById('app').style.display = 'none';
  document.getElementById('splash').classList.remove('hide');
  window.scrollTo(0,0);
}
</script>
